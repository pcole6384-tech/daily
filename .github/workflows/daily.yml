name: PC Horror Daily

on:
  schedule:
    # 23:30 UTC = 07:30 Asia/Singapore
    - cron: "30 23 * * *"
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install ".[dev]"
      - name: Run daily report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          ITAD_API_KEY: ${{ secrets.ITAD_API_KEY }}
          ITAD_COUNTRY: ${{ secrets.ITAD_COUNTRY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          TZ: Asia/Singapore
        run: python -m horror_daily
      - name: Upload generated reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: horror-daily-reports
          path: |
            reports/
            data/
